<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Unidades Móveis</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --line: #e1e5eb;
      --line-soft: #eef1f5;
      --text: #1f2933;
      --muted: #667085;
      --muted-2: #98a2b3;

      --primary: #1b4f9c;
      --primary-2: #153f7e;
      --primary-soft: #edf4ff;

      --success: #16875a;
      --danger: #b42318;
      --warning: #b65c00;
      --purple: #5b45b5;

      --shadow: 0 8px 22px rgba(16, 24, 40, .06);
      --shadow-sm: 0 3px 10px rgba(16, 24, 40, .045);

      --radius: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    .page {
      max-width: 1540px;
      margin: 0 auto;
      padding: 22px 28px 36px;
    }

    .header {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid #d6e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -.25px;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--primary-2);
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 15px;
      border-top: 1px solid var(--line-soft);
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: #344054;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .tab:hover {
      border-color: #b9c4d3;
      background: #fff;
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .filters {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px;
      margin-bottom: 18px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .field select,
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 9px 10px;
      font-size: 12px;
      outline: none;
      color: var(--text);
    }

    .field select:focus,
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27, 79, 156, .10);
    }

    .section {
      margin-top: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin: 0 0 10px;
    }

    .section-title {
      margin: 0;
      color: #263444;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .65px;
      font-weight: 800;
    }

    .section-note {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 15px 15px 14px;
      min-height: 104px;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .55px;
      font-weight: 800;
      margin-bottom: 9px;
    }

    .kpi-value {
      color: #111827;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -.4px;
    }

    .kpi.primary .kpi-value { color: var(--primary); }
    .kpi.success .kpi-value { color: var(--success); }
    .kpi.danger .kpi-value { color: var(--danger); }
    .kpi.warning .kpi-value { color: var(--warning); }
    .kpi.purple .kpi-value { color: var(--purple); }

    .kpi-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.35;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 15px;
      min-width: 0;
    }

    .card-title {
      margin: 0 0 12px;
      color: #263444;
      font-size: 13px;
      font-weight: 800;
    }

    .chart-box {
      position: relative;
      height: 280px;
    }

    .chart-box.tall {
      height: 360px;
    }

    .empty-state {
      background: var(--surface);
      border: 1px dashed #cfd6e1;
      border-radius: var(--radius);
      padding: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty-state strong {
      color: #344054;
    }

    .metric-list {
      display: grid;
      gap: 10px;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
      align-items: center;
    }

    .metric:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      font-size: 13px;
      color: #263444;
      text-align: right;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .table-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px 15px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line-soft);
    }

    .table-title {
      color: #263444;
      font-size: 13px;
      font-weight: 800;
    }

    .table-info {
      color: var(--muted);
      font-size: 11.5px;
      text-align: right;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #fff;
      border-bottom: 1px solid var(--line-soft);
      color: var(--muted);
      text-align: left;
      padding: 11px 12px;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .45px;
      white-space: nowrap;
    }

    td {
      border-bottom: 1px solid var(--line-soft);
      padding: 11px 12px;
      color: #344054;
      font-size: 12px;
      vertical-align: top;
    }

    tbody tr:hover {
      background: #fafcff;
    }

    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: #475467;
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.realizado {
      background: #ecfdf3;
      border-color: #abefc6;
      color: #067647;
    }

    .badge.cancelado {
      background: #fef3f2;
      border-color: #fecdca;
      color: #b42318;
    }

    .badge.atual {
      background: #eff8ff;
      border-color: #b2ddff;
      color: #175cd3;
    }

    .badge.confirmado {
      background: #f4f3ff;
      border-color: #d9d6fe;
      color: #5925dc;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: var(--surface-2);
      border-top: 1px solid var(--line-soft);
    }

    .pg-controls {
      display: flex;
      gap: 6px;
    }

    .pg-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 800;
    }

    .pg-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .subtabs {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .subtab {
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .subtab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .loading,
    .error {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 1200px) {
      .filters-grid {
        grid-template-columns: 1fr 1fr;
      }

      .kpi-grid {
        grid-template-columns: 1fr 1fr;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px;
      }

      .header-top {
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .filters-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 20px;
      }

      .chart-box,
      .chart-box.tall {
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-mark">UM</div>
          <div>
            <h1 id="pageTitle">Dashboard Unidades Móveis</h1>
            <p id="pageSubtitle">Carregando dados...</p>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="btnClearFilters">Limpar filtros</button>
          <button class="btn primary" id="btnExportCurrent">Exportar visão atual</button>
        </div>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="geral">Visão Geral</button>
        <button class="tab" data-tab="historico">Histórico / Agenda</button>
        <button class="tab" data-tab="financeiro">Financeiro / Fretes</button>
        <button class="tab" data-tab="frota">Frota / Cenários</button>
        <button class="tab" data-tab="producao">Produção / Eficiência 2025</button>
        <button class="tab" data-tab="analiticos">Analíticos</button>
      </nav>
    </header>

    <section class="filters">
      <div class="filters-grid">
        <div class="field">
          <label for="fAno">Ano</label>
          <select id="fAno"></select>
        </div>

        <div class="field">
          <label for="fStatus">Status</label>
          <select id="fStatus"></select>
        </div>

        <div class="field">
          <label for="fUnidade">Unidade móvel</label>
          <select id="fUnidade"></select>
        </div>

        <div class="field">
          <label for="fCidade">Cidade / Unidade solicitante</label>
          <select id="fCidade"></select>
        </div>

        <div class="field">
          <label for="fBusca">Busca geral</label>
          <input id="fBusca" type="text" placeholder="Cidade, responsável, empresa, RN..." />
        </div>
      </div>
    </section>

    <div id="content" class="loading">Carregando JSON...</div>
  </main>

  <script>
    const JSON_URL = 'data/unidades_moveis.json?v=' + Date.now();

    let DASH = null;
    let currentTab = 'geral';
    let charts = [];
    let analiticoTipo = 'agenda';

    let agendaPage = 1;
    let producaoPage = 1;
    const PAGE_SIZE = 25;

    const $ = id => document.getElementById(id);

    async function init() {
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        DASH = await response.json();

        renderHeader();
        populateFilters();
        bindEvents();
        renderTab('geral');
      } catch (error) {
        $('content').className = 'error';
        $('content').textContent = 'Erro ao carregar JSON: ' + error.message;
      }
    }

    function bindEvents() {
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderTab(btn.dataset.tab);
        });
      });

      ['fAno', 'fStatus', 'fUnidade', 'fCidade'].forEach(id => {
        $(id).addEventListener('change', () => {
          agendaPage = 1;
          renderTab(currentTab);
        });
      });

      $('fBusca').addEventListener('input', debounce(() => {
        agendaPage = 1;
        renderTab(currentTab);
      }, 250));

      $('btnClearFilters').addEventListener('click', () => {
        ['fAno', 'fStatus', 'fUnidade', 'fCidade'].forEach(id => $(id).value = '');
        $('fBusca').value = '';
        agendaPage = 1;
        renderTab(currentTab);
      });

      $('btnExportCurrent').addEventListener('click', exportCurrentView);
    }

    function renderHeader() {
      const meta = DASH.metadata || {};
      $('pageSubtitle').textContent = `${meta.origem || '-'} | Atualizado em: ${meta.atualizadoEm || '-'}`;
    }

    function populateFilters() {
      const agenda = DASH.data?.agendaHistorico || [];

      setOptions('fAno', 'Todos', unique(agenda.map(x => x.anoInicio).filter(Boolean)).sort((a, b) => a - b));
      setOptions('fStatus', 'Todos', unique(agenda.map(x => x.statusPadronizado).filter(Boolean)).sort(ptSort));
      setOptions('fUnidade', 'Todas', unique(agenda.map(x => x.unidadeMovel).filter(Boolean)).sort(ptSort));
      setOptions('fCidade', 'Todas', unique(agenda.map(x => x.unidadeSolicitante).filter(Boolean)).sort(ptSort));
    }

    function setOptions(id, labelAll, values) {
      const select = $(id);
      select.innerHTML = `<option value="">${labelAll}</option>`;

      values.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });
    }

    function renderTab(tab) {
      currentTab = tab;
      destroyCharts();

      const titles = {
        geral: 'Visão Geral',
        historico: 'Histórico / Agenda',
        financeiro: 'Financeiro / Fretes',
        frota: 'Frota / Cenários',
        producao: 'Produção / Eficiência 2025',
        analiticos: 'Analíticos'
      };

      $('pageTitle').textContent = titles[tab] || 'Dashboard Unidades Móveis';

      if (tab === 'geral') renderVisaoGeral();
      if (tab === 'historico') renderHistorico();
      if (tab === 'financeiro') renderFinanceiro();
      if (tab === 'frota') renderFrota();
      if (tab === 'producao') renderProducao();
      if (tab === 'analiticos') renderAnaliticos();
    }

    function getFilteredAgenda() {
      const agenda = DASH.data?.agendaHistorico || [];
      const ano = $('fAno').value;
      const status = $('fStatus').value;
      const unidade = $('fUnidade').value;
      const cidade = $('fCidade').value;
      const busca = norm($('fBusca').value);

      return agenda.filter(item => {
        if (ano && String(item.anoInicio) !== String(ano)) return false;
        if (status && item.statusPadronizado !== status) return false;
        if (unidade && item.unidadeMovel !== unidade) return false;
        if (cidade && item.unidadeSolicitante !== cidade) return false;

        if (busca) {
          const text = norm([
            item.origem,
            item.unidadeMovel,
            item.tipoUnidade,
            item.unidadeSolicitante,
            item.responsavel,
            item.empresa,
            item.rn,
            item.nf,
            item.statusPadronizado
          ].join(' '));

          if (!text.includes(busca)) return false;
        }

        return true;
      });
    }

    function renderVisaoGeral() {
      const agenda = getFilteredAgenda();
      const k = calcKpisAgenda(agenda);
      const meta = DASH.metadata?.totais || {};
      const producao = DASH.kpis?.producao || {};

      $('content').className = '';
      $('content').innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">Indicadores executivos</h2>
            <div class="section-note">Base filtrada: ${fmtInt(agenda.length)} registro(s)</div>
          </div>

          <div class="kpi-grid">
            ${kpi('Total de deslocamentos', fmtInt(k.total), 'Agenda e histórico consolidados', 'primary')}
            ${kpi('Realizados', fmtInt(k.realizados), `${pctText(k.realizados, k.total)} do total`, 'success')}
            ${kpi('Cancelados', fmtInt(k.cancelados), `${pctText(k.cancelados, k.total)} do total`, 'danger')}
            ${kpi('Atuais / Confirmados', fmtInt(k.atuais + k.confirmados), `Atual: ${fmtInt(k.atuais)} | Confirmado: ${fmtInt(k.confirmados)}`, 'purple')}

            ${kpi('Faturamento total', fmtMoney(k.faturamentoTotal), 'Valor contratado informado', 'warning')}
            ${kpi('Frete total', fmtMoney(k.freteTotal), 'Fretes vinculados à agenda', 'warning')}
            ${kpi('Frete médio', fmtMoney(k.freteMedio), 'Média por registro com frete', '')}
            ${kpi('Unidades móveis', fmtInt(k.unidades), 'Unidades distintas', '')}

            ${kpi('Escola Móvel', pct(k.percentualEscolaMovel), `${fmtInt(k.escolaSim)} registro(s) marcados como Sim`, 'success')}
            ${kpi('Cidade mais atendida', esc(k.cidadeTop || '-'), 'Maior volume de atendimentos', 'primary')}
            ${kpi('Produção 2025', fmtInt(producao.registros), 'Registros na aba Produção 2025', '')}
            ${kpi('Registros financeiros', fmtInt((meta.orcamento || 0) + (meta.contrato || 0) + (meta.analiseValores || 0)), 'Orçamento, contrato e análise', '')}
          </div>
        </section>

        <section class="section grid-2">
          <div class="card">
            <h3 class="card-title">Deslocamentos por ano</h3>
            <div class="chart-box"><canvas id="chartAno"></canvas></div>
          </div>

          <div class="card">
            <h3 class="card-title">Status dos deslocamentos</h3>
            <div class="chart-box"><canvas id="chartStatus"></canvas></div>
          </div>
        </section>

        <section class="section grid-2">
          <div class="card">
            <h3 class="card-title">Top 10 cidades por atendimento</h3>
            <div class="chart-box tall"><canvas id="chartCidades"></canvas></div>
          </div>

          <div class="card">
            <h3 class="card-title">Resumo de dados carregados</h3>
            <div class="metric-list">
              ${metric('Agenda / Histórico', fmtInt(meta.agendaHistorico || 0))}
              ${metric('Cenários 2023 a 2027', fmtInt(meta.cenarios || 0))}
              ${metric('Orçamento 2025', fmtInt(meta.orcamento || 0))}
              ${metric('CT 28724 - Canto e Rohde', fmtInt(meta.contrato || 0))}
              ${metric('Análise dos valores', fmtInt(meta.analiseValores || 0))}
              ${metric('Produção 2025', fmtInt(meta.producao || 0))}
            </div>
          </div>
        </section>

        <section class="section">
          ${renderResumoUnidadesTable(agenda, 12)}
        </section>
      `;

      chartBar('chartAno', groupCountByYear(agenda, 'anoInicio'), 'Registros', false);
      chartDoughnut('chartStatus', groupCount(agenda, 'statusPadronizado').slice(0, 8));
      chartHorizontalBar('chartCidades', groupCount(agenda, 'unidadeSolicitante').filter(x => x.nome !== 'Não informado').slice(0, 10), 'Atendimentos', false);
    }

    function renderHistorico() {
      const agenda = getFilteredAgenda();

      $('content').className = '';
      $('content').innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">Histórico / Agenda</h2>
            <div class="section-note">Anos diversos conforme abas de agenda e histórico</div>
          </div>

          <div class="kpi-grid">

    function tableCard(title, info, headers, rows, pagination = '') {
      const body = rows.length
        ? rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')
        : `<tr><td colspan="${headers.length}" style="text-align:center;color:var(--muted);padding:24px;">Nenhum registro encontrado.</td></tr>`;

      return `
        <div class="table-card">
          <div class="table-top">
            <div class="table-title">${esc(title)}</div>
            <div class="table-info">${esc(info || '')}</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr>
              </thead>
              <tbody>${body}</tbody>
            </table>
          </div>
          ${pagination}
        </div>
      `;
    }

    function paginationHtml(type, total, page) {
      const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));

      return `
        <div class="pagination">
          <div class="table-info">Página ${fmtInt(page)} de ${fmtInt(pages)}</div>
          <div class="pg-controls">
            <button class="pg-btn" data-page-type="${type}" data-dir="-1" ${page <= 1 ? 'disabled' : ''}>Anterior</button>
            <button class="pg-btn" data-page-type="${type}" data-dir="1" ${page >= pages ? 'disabled' : ''}>Próxima</button>
          </div>
        </div>
      `;
    }

    function bindPagination(type, total) {
      document.querySelectorAll(`[data-page-type="${type}"]`).forEach(btn => {
        btn.addEventListener('click', () => {
          const dir = Number(btn.dataset.dir);
          const max = Math.max(1, Math.ceil(total / PAGE_SIZE));

          if (type === 'agenda') agendaPage = Math.min(max, Math.max(1, agendaPage + dir));
          if (type === 'producao') producaoPage = Math.min(max, Math.max(1, producaoPage + dir));

          renderAnaliticos();
        });
      });
    }

    function kpi(label, value, sub, tone = '') {
      return `
        <article class="kpi ${tone}">
          <div class="kpi-label">${esc(label)}</div>
          <div class="kpi-value">${value ?? '-'}</div>
          <div class="kpi-sub">${esc(sub || '')}</div>
        </article>
      `;
    }

    function metric(label, value) {
      return `
        <div class="metric">
          <span>${esc(label)}</span>

      `;
    }

    function statusBadge(status) {
      const s = String(status || 'Sem status');
      let cls = '';

      if (s === 'Realizado') cls = 'realizado';
      else if (s === 'Cancelado') cls = 'cancelado';
      else if (s === 'Atual') cls = 'atual';
      else if (s === 'Confirmado') cls = 'confirmado';

      return `<span class="badge ${cls}">${esc(s)}</span>`;
    }

    function calcKpisAgenda(agenda) {
      const total = agenda.length;
      const realizados = countStatus(agenda, 'Realizado');
      const cancelados = countStatus(agenda, 'Cancelado');
      const atuais = countStatus(agenda, 'Atual');
      const confirmados = countStatus(agenda, 'Confirmado');
      const faturamentoTotal = sum(agenda, 'faturamentoTotalNumero');
      const freteTotal = sum(agenda, 'valorFreteNumero');
      const comFrete = agenda.filter(x => Number(x.valorFreteNumero || 0) > 0).length;
      const freteMedio = comFrete ? freteTotal / comFrete : 0;
      const unidades = unique(agenda.map(x => x.unidadeMovel).filter(Boolean)).length;
      const escolaSim = agenda.filter(x => x.escolaMovelPadronizado === 'Sim').length;
      const cidadeTop = groupCount(agenda, 'unidadeSolicitante').filter(x => x.nome !== 'Não informado')[0]?.nome || '';

      return {
        total,
        realizados,
        cancelados,
        atuais,
        confirmados,
        faturamentoTotal,
        freteTotal,
        freteMedio,
        unidades,
        escolaSim,
        percentualEscolaMovel: total ? escolaSim / total : 0,
        cidadeTop
      };
    }

    function countStatus(arr, status) {
      return arr.filter(x => x.statusPadronizado === status).length;
    }

    function resumoUnidades(agenda) {
      const map = {};

      agenda.forEach(item => {
        const key = item.unidadeMovel || 'Não informado';

        if (!map[key]) {
          map[key] = {
            unidadeMovel: key,
            tipoUnidade: item.tipoUnidade || '',
            total: 0,
            realizados: 0,
            cancelados: 0,
            faturamentoTotal: 0,
            freteTotal: 0
          };
        }

        map[key].total++;
        if (item.statusPadronizado === 'Realizado') map[key].realizados++;
        if (item.statusPadronizado === 'Cancelado') map[key].cancelados++;
        map[key].faturamentoTotal += Number(item.faturamentoTotalNumero || 0);
        map[key].freteTotal += Number(item.valorFreteNumero || 0);
      });

      return Object.values(map).sort((a, b) => b.total - a.total);
    }

    function resumoCidades(agenda) {
      const map = {};

      agenda.forEach(item => {
        const key = item.unidadeSolicitante || 'Não informado';

        if (!map[key]) {
          map[key] = {
            cidade: key,
            total: 0,
            realizados: 0,
            cancelados: 0,
            faturamentoTotal: 0,
            freteTotal: 0
          };
        }

        map[key].total++;
        if (item.statusPadronizado === 'Realizado') map[key].realizados++;
        if (item.statusPadronizado === 'Cancelado') map[key].cancelados++;
        map[key].faturamentoTotal += Number(item.faturamentoTotalNumero || 0);
        map[key].freteTotal += Number(item.valorFreteNumero || 0);
      });

      return Object.values(map).sort((a, b) => b.total - a.total);
    }

    function groupCount(arr, field) {
      const map = {};

      arr.forEach(item => {
        const key = item[field] || 'Não informado';
        map[key] = (map[key] || 0) + 1;
      });

      return Object.keys(map)
        .map(k => ({ nome: k, valor: map[k] }))
        .sort((a, b) => b.valor - a.valor);
    }

    function groupCountByYear(arr, field) {
      return groupCount(arr, field)
        .filter(x => x.nome !== 'Não informado')
        .sort((a, b) => Number(a.nome) - Number(b.nome));
    }

    function groupSum(arr, groupField, valueField) {
      const map = {};

      arr.forEach(item => {
        const key = item[groupField] || 'Não informado';
        map[key] = (map[key] || 0) + Number(item[valueField] || 0);
      });

      return Object.keys(map)
        .map(k => ({ nome: k, valor: map[k] }))
        .filter(x => x.nome !== 'Não informado')
        .sort((a, b) => {
          const na = Number(a.nome);
          const nb = Number(b.nome);
          if (!isNaN(na) && !isNaN(nb)) return na - nb;
          return String(a.nome).localeCompare(String(b.nome), 'pt-BR');
        });
    }

    function chartBar(id, data, label, money) {
      const ctx = $(id);
      if (!ctx) return;

      const chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(x => x.nome),
          datasets: [{
            label,
            data: data.map(x => x.valor),
            backgroundColor: '#1b4f9c',
            borderRadius: 5,
            maxBarThickness: 42
          }]
        },
        options: chartOptions(money)
      });

      charts.push(chart);
    }

    function chartHorizontalBar(id, data, label, money) {
      const ctx = $(id);
      if (!ctx) return;

      const chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(x => x.nome),
          datasets: [{
            label,
            data: data.map(x => x.valor),
            backgroundColor: '#1b4f9c',
            borderRadius: 5,
            maxBarThickness: 22
          }]
        },
        options: {
          ...chartOptions(money),
          indexAxis: 'y'
        }
      });

      charts.push(chart);
    }

    function chartDoughnut(id, data) {
      const ctx = $(id);
      if (!ctx) return;

      const colors = ['#16875a', '#b42318', '#1b4f9c', '#5b45b5', '#b65c00', '#667085', '#7aa7e8', '#aab4c2'];

      const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: data.map(x => x.nome),
          datasets: [{
            data: data.map(x => x.valor),
            backgroundColor: colors,
            borderColor: '#fff',
            borderWidth: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '62%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                boxWidth: 10,
                boxHeight: 10,
                font: { size: 11, weight: 'bold' }
              }
            },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.label}: ${fmtInt(ctx.raw)}`
              }
            }
          }
        }
      });

      charts.push(chart);
    }

    function chartOptions(money) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label || 'Valor'}: ${money ? fmtMoney(ctx.raw) : fmtInt(ctx.raw)}`
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#eef1f5' },
            ticks: {
              color: '#667085',
              font: { size: 10 }
            }
          },
          y: {
            grid: { color: '#eef1f5' },
            ticks: {
              color: '#667085',
              font: { size: 10 }
            }
          }
        }
      };
    }

    function destroyCharts() {
      charts.forEach(chart => chart.destroy());
      charts = [];
    }

    function exportCurrentView() {
      let rows = [];
      let filename = 'dashboard_unidades_moveis.csv';

      if (currentTab === 'producao') {
        rows = DASH.data?.producao || [];
        filename = 'producao_2025.csv';
      } else if (currentTab === 'financeiro') {
        rows = DASH.data?.financeiro?.contrato || [];
        filename = 'financeiro_fretes.csv';
      } else if (currentTab === 'frota') {
        rows = DASH.data?.cenarios || [];
        filename = 'cenarios_frota.csv';
      } else {
        rows = getFilteredAgenda();
        filename = 'agenda_historico.csv';
      }

      exportCSV(rows, filename);
    }

    function exportCSV(rows, filename) {
      if (!rows.length) {
        alert('Não há registros para exportar.');
        return;
      }

      const headers = Object.keys(rows[0]);
      const csv = [
        headers.join(';'),
        ...rows.map(row => headers.map(h => csvCell(row[h])).join(';'))
      ].join('\n');

      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');

      link.href = URL.createObjectURL(blob);
      link.download = filename;

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(link.href);
    }

    function csvCell(value) {
      return '"' + String(value ?? '').replace(/"/g, '""') + '"';
    }

    function hasFilled(arr, field) {
      return arr.some(item => String(item[field] ?? '').trim() !== '');
    }

    function sum(arr, field) {
      return arr.reduce((acc, item) => acc + Number(item[field] || 0), 0);
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function ptSort(a, b) {
      return String(a).localeCompare(String(b), 'pt-BR', { sensitivity: 'base' });
    }

    function debounce(fn, delay) {
      let timer = null;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    function norm(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
    }

    function fmtInt(n) {
      return new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 }).format(Number(n || 0));
    }

    function fmtMoney(n) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        maximumFractionDigits: 0
      }).format(Number(n || 0));
    }

    function pct(n) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'percent',
        maximumFractionDigits: 1
      }).format(Number(n || 0));
    }

    function pctText(part, total) {
      if (!total) return '0%';
      return pct(Number(part || 0) / Number(total || 0));
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
